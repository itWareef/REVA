name: بناء ونشر موقع مسكن ريفا على cPanel

# يعمل تلقائياً عند أي تعديل من لوحة التحكم (push على main)، أو يدوياً من تبويب Actions
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: جلب الكود
        uses: actions/checkout@v4

      - name: تجهيز Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: تثبيت الحزم
        run: npm ci

      - name: بناء الموقع الثابت
        run: npm run build

      - name: النشر على cPanel عبر FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./out/
          # حساب FTP مخصّص جذره public_html ⇐ الوجهة ./
          server-dir: ./
          # لا تحذف هذه الملفات إن وُجدت على السيرفر
          exclude: |
            **/.well-known/**
            **/cgi-bin/**
